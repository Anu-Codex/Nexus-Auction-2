<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Auction Live</title>
    <!-- 1. SOCKET.IO LIBRARY - DO NOT REMOVE -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; --card: #1b1b2f; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .hidden { display: none !important; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); }
        th, td { padding: 12px; border: 1px solid #333; text-align: left; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        #chatBox { background: var(--card); height: 300px; border: 1px solid #333; display: flex; flex-direction: column; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .input-area { display: flex; padding: 10px; background: #111; }
        input { flex: 1; padding: 8px; background: #222; color: white; border: 1px solid #444; }
        button { padding: 8px 15px; background: var(--primary); border: none; color: black; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>NEXUS AUCTION</h1>
        <div id="authSection">
            <div id="loginSection">
                <button onclick="login()">LOGIN AS CAPTAIN/ADMIN</button>
            </div>
            <div id="logoutSection" class="hidden">
                <span id="userDisplay"></span>
                <button onclick="logout()" style="background: #ff4d4d;">LOGOUT</button>
            </div>
        </div>
    </div>

    <div id="purseDisplay" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
        <!-- Purse data loads here -->
    </div>

    <div class="grid">
        <div>
            <h3>Available Players</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Base Price</th>
                    </tr>
                </thead>
                <tbody id="playerList">
                    <tr><td colspan="3">Waiting for server data...</td></tr>
                </tbody>
            </table>
        </div>

        <div>
            <h3>Live Chat</h3>
            <div id="chatBox">
                <div id="chatMessages"></div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="Login to chat..." disabled>
                    <button id="chatSendBtn" onclick="sendChat()" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // REPLACE THIS URL WITH YOUR ACTUAL RENDER BACKEND URL
        const BACKEND_URL = "https://nexus-go.onrender.com/";
        const socket = io(BACKEND_URL);

        let currentUser = null;

        // USER DATABASE
        const users = {
            "admin@nexus.com": { password: "admin123", role: "admin", team: "Admin" },
        "abhisek@nexus.com": { password: "abhisek123", role: "captain", team: "RISING FALCONS" },
        "sukdeb@nexus.com": { password: "sukdeb123", role: "captain", team: "Team NRG" },
        "avirup@nexus.com": { password: "avirup123", role: "captain", team: "Team SHAKTI" },
        "sanju@nexus.com": { password: "sanju123", role: "captain", team: "Golden Knights FC" },
        "trirup@nexus.com": { password: "trirup123", role: "captain", team: "Dominators" },
        "gourav@nexus.com": { password: "gourav123", role: "captain", team: "Aura Farmer's" }  }
        };

        // 1. DATA LOADING
        socket.on('updateData', (data) => {
            console.log("Data Received:", data);
            renderPlayers(data.players);
            renderPurse(data.teams);
        });

        function renderPlayers(players) {
            const list = document.getElementById('playerList');
            if (!players || players.length === 0) {
                list.innerHTML = "<tr><td colspan='3'>No players available</td></tr>";
                return;
            }
            list.innerHTML = players.filter(p => !p.soldTo).map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>${p.basePrice} L</td>
                </tr>
            `).join('');
        }

        function renderPurse(teams) {
            const container = document.getElementById('purseDisplay');
            if (!teams) return;
            container.innerHTML = Object.entries(teams).map(([name, data]) => `
                <div class="stat-card">
                    <strong>${name}</strong><br>
                    Budget: ${data.budget} L | Players: ${data.playerCount}
                </div>
            `).join('');
        }

        // 2. LOGIN LOGIC
        function login() {
            const email = prompt("Email:");
            const pass = prompt("Password:");
            const user = users[email];

            if (user && user.password === pass) {
                currentUser = user;
                alert("Welcome " + user.team);
                updateUI();
            } else {
                alert("Wrong login!");
            }
        }

        function logout() {
            currentUser = null;
            location.reload();
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('logoutSection').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = currentUser.team + " ";
                
                // Unlock Chat
                document.getElementById('chatInput').disabled = false;
                document.getElementById('chatInput').placeholder = "Type as " + currentUser.team;
                document.getElementById('chatSendBtn').disabled = false;
            }
        }

        // 3. CHAT LOGIC
        function sendChat() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() && currentUser) {
                socket.emit('sendMessage', {
                    sender: currentUser.team,
                    text: input.value
                });
                input.value = "";
            }
        }

        socket.on('receiveMessage', (msg) => {
            const box = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.innerHTML = `<b>${msg.sender}:</b> ${msg.text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        socket.on('connect', () => console.log("Connected to Server!"));
        socket.on('connect_error', (err) => console.log("Connection Error: ", err));

    </script>
</body>
</html>
