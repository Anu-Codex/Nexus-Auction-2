<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>NEXUS AUCTION LIVE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --card: #161b22; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 10px; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .purse-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        
        .card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid #30363d; }
        .team-card { border-left: 4px solid var(--primary); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: var(--card); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
        th { color: var(--primary); text-transform: uppercase; font-size: 12px; }

        .chat-box { height: 400px; display: flex; flex-direction: column; background: var(--card); border-radius: 8px; border: 1px solid #30363d; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 15px; font-size: 14px; }
        .chat-input { display: flex; padding: 10px; gap: 10px; border-top: 1px solid #30363d; }
        
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; flex: 1; }
        button { background: var(--primary); color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #444; cursor: not-allowed; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0;">NEXUS AUCTION</h1>
            <div id="status"><span class="status-dot" style="background:orange;"></span> Connecting to Server...</div>
        </div>
        <div id="authControls">
            <div id="loginArea">
                <button onclick="doLogin()">LOGIN</button>
            </div>
            <div id="logoutArea" class="hidden">
                <b id="userName" style="color:var(--primary); margin-right:10px;"></b>
                <button onclick="doLogout()" style="background:#ff4d4d; color:white;">LOGOUT</button>
            </div>
        </div>
    </header>

    <div id="purseDisplay" class="purse-grid">
        <!-- Team data will appear here -->
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>AVAILABLE PLAYERS</h3>
            <table>
                <thead>
                    <tr><th>Player Name</th><th>Category</th><th>Base Price</th></tr>
                </thead>
                <tbody id="playerTable">
                    <tr><td colspan="3">Loading data... please wait.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="chat-box">
            <div style="padding:10px; border-bottom:1px solid #30363d; font-weight:bold; color:var(--primary);">LIVE CHAT</div>
            <div id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatMsg" placeholder="Login to chat..." disabled>
                <button id="sendBtn" onclick="sendMsg()" disabled>SEND</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. SET YOUR BACKEND URL HERE
    const SERVER_URL = "https://nexus-go.onrender.com"; // <--- CHANGE THIS!
    
    const socket = io(SERVER_URL);
    let user = null;

    // 2. USER DATABASE
    const users = {
        "admin@nexus.com": { password: "admin123", role: "admin", team: "Admin" },
        "abhisek@nexus.com": { password: "abhisek123", role: "captain", team: "RISING FALCONS" },
        "sukdeb@nexus.com": { password: "sukdeb123", role: "captain", team: "Team NRG" },
        "avirup@nexus.com": { password: "avirup123", role: "captain", team: "Team SHAKTI" },
        "sanju@nexus.com": { password: "sanju123", role: "captain", team: "Golden Knights FC" },
        "trirup@nexus.com": { password: "trirup123", role: "captain", team: "Dominators" },
        "gourav@nexus.com": { password: "gourav123", role: "captain", team: "Aura Farmer's" }  }
    };

    // 3. SOCKET CONNECTION EVENTS
    socket.on('connect', () => {
        document.getElementById('status').innerHTML = '<span class="status-dot" style="background:lightgreen;"></span> Connected to Server';
    });

    socket.on('connect_error', () => {
        document.getElementById('status').innerHTML = '<span class="status-dot" style="background:red;"></span> Server Offline (Check URL)';
    });

    // 4. RECEIVE DATA (Players & Purse)
    socket.on('updateData', (data) => {
        console.log("Data Received:", data);
        
        // Update Players
        const pTable = document.getElementById('playerTable');
        if(data.players) {
            const available = data.players.filter(p => !p.soldTo);
            pTable.innerHTML = available.length ? available.map(p => 
                `<tr><td><b>${p.name}</b></td><td>${p.category}</td><td>${p.basePrice} L</td></tr>`
            ).join('') : '<tr><td colspan="3">No players available</td></tr>';
        }

        // Update Purse
        const pDisplay = document.getElementById('purseDisplay');
        if(data.teams) {
            pDisplay.innerHTML = Object.entries(data.teams).map(([name, info]) => `
                <div class="card team-card">
                    <div style="font-size:12px; color:var(--primary)">${name}</div>
                    <div style="font-size:18px; font-weight:bold;">${info.budget} L</div>
                    <div style="font-size:11px; color:#888;">Players: ${info.playerCount}/12</div>
                </div>
            `).join('');
        }
    });

    // 5. LOGIN LOGIC
    function doLogin() {
        const email = prompt("Email:");
        const password = prompt("Password:");
        const found = users[email];

        if (found && found.pass === password) {
            user = found;
            alert("Welcome, " + user.team);
            
            // UI Updates
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('logoutArea').classList.remove('hidden');
            document.getElementById('userName').innerText = user.team;
            
            // Unlock Chat
            document.getElementById('chatMsg').disabled = false;
            document.getElementById('chatMsg').placeholder = "Message as " + user.team + "...";
            document.getElementById('sendBtn').disabled = false;
        } else {
            alert("Invalid Login Details!");
        }
    }

    function doLogout() {
        location.reload();
    }

    // 6. CHAT LOGIC
    function sendMsg() {
        const input = document.getElementById('chatMsg');
        if (input.value.trim() && user) {
            socket.emit('sendMessage', { sender: user.team, text: input.value });
            input.value = "";
        }
    }

    socket.on('receiveMessage', (msg) => {
        const box = document.getElementById('chatMessages');
        const div = document.createElement('div');
        div.style.marginBottom = "8px";
        div.innerHTML = `<b style="color:var(--primary)">${msg.sender}:</b> ${msg.text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
</script>

</body>
</html>
